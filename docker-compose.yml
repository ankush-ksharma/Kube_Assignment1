version: '3.8'

services:
  # PostgreSQL Database Service
  database:
    image: postgres:15-alpine
    container_name: nagp_database
    environment:
      POSTGRES_USER: nagp_user
      POSTGRES_PASSWORD: nagp_password
      POSTGRES_DB: nagp_db
    ports:
      - "5432:5432"
    volumes:
      # Mount the initialization SQL script
      - ./application/init/database_initialization.sql:/docker-entrypoint-initdb.d/init.sql
      # Persist database data
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nagp_user -d nagp_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nagp_network

  # Flask Application Service
  app:
    build:
      context: ./application
      dockerfile: Dockerfile
    container_name: nagp_app
    environment:
      DB_USER: nagp_user
      DB_PASSWORD: nagp_password
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: nagp_db
    ports:
      - "80:3000"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - nagp_network
    restart: unless-stopped

networks:
  nagp_network:
    driver: bridge

volumes:
  postgres_data:
